<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title != null ? title + ' - TheBug' : 'TheBug'}">TheBug</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>

<body>
    <!-- サイドバー -->
    <aside th:fragment="sidebar">
        <div class="logo">
            <i class="fas fa-code-branch"></i> TheBug
        </div>
        <nav>
            <a th:href="@{/}" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" class="menu-item"><i class="fas fa-bug"></i> All Bugs</a>
            <a href="#" class="menu-item"><i class="fas fa-shield-halved"></i> Security</a>
            <a href="#" class="menu-item"><i class="fas fa-database"></i> Database</a>
        </nav>
    </aside>
</body>
</html>
