<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head th:replace="~{fragments/layout :: head('Knowledge Base')}">
</head>
<body class="flex min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-200">
<aside th:replace="~{fragments/layout :: sidebar}"></aside>

<main class="flex-1 p-6 md:p-10">
    <header class="mb-8 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <h1 class="text-3xl font-semibold tracking-tight text-white">Knowledge Base</h1>
        <div class="flex w-full max-w-sm items-center gap-3 rounded-lg border border-slate-700 bg-slate-900/70 px-4 py-2.5 text-slate-400">
            <i class="fas fa-search text-xs"></i>
            <span class="text-sm">Search issues...</span>
        </div>
    </header>

    <div th:each="cat : ${categories}" class="mb-8 rounded-2xl border border-slate-700/80 bg-slate-800/70 p-6 shadow-[0_12px_30px_rgba(0,0,0,0.35)]">
        <div class="mb-5 border-b border-slate-700 pb-3">
            <span class="text-xl font-semibold text-violet-300" th:text="${cat}">Category Title</span>
        </div>

        <ul class="space-y-2">
            <li th:each="b : ${bugsByCategory[__${cat}__]}" class="group flex items-center justify-between rounded-lg border-l-4 border-transparent bg-slate-700/70 px-4 py-3 transition hover:scale-[1.01] hover:border-violet-400 hover:bg-slate-700">
                <div class="flex items-center gap-4">
                    <i class="fas fa-circle-dot text-violet-300"></i>
                    <a th:href="${b.path}" class="font-medium text-slate-100 hover:text-white" th:text="${b.title}">Bug Title</a>
                </div>
                <span class="rounded-md border border-slate-600 bg-black/30 px-3 py-1 font-mono text-xs text-emerald-300" th:text="${b.bugCode}">CODE-2386</span>
            </li>
        </ul>
    </div>
</main>
</body>
</html>
